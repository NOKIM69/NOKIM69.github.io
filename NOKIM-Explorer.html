<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>معرفی NOKIM Explorer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent: #00d2ff;
        }

        body {
            margin: 0;
            background: radial-gradient(circle at bottom right, #0f3460, #16213e, #1a1a2e);
            color: white;
            font-family: 'Vazirmatn', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .main-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .logo-large {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(0, 210, 255, 0.5));
        }

        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .version { color: var(--accent); font-weight: bold; margin-bottom: 20px; }
        
        .description {
            line-height: 1.8;
            color: #ddd;
            margin-bottom: 30px;
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .feature-item {
            background: rgba(0,0,0,0.2);
            padding: 10px 20px;
            border-radius: 15px;
            border: 1px solid var(--glass-border);
        }

        .download-btn {
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            padding: 15px 40px;
            border-radius: 50px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            transition: 0.3s;
            display: inline-block;
        }

        .download-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.6);
        }
    </style>
</head>
<body>

<div class="main-card">
    <!-- استفاده از آیکون خودت -->
    <img src="NOKIM2026.ico" class="logo-large" alt="NOKIM Logo">
    
    <h1>NOKIM Explorer</h1>
    <div class="version">نسخه: 1.0.0 Alpha</div>
    
    <p class="description">
        NOKIM Explorer یک مرورگر وب مدرن، امن و فوق‌سریع است که برای تجربه کاربری متفاوت ساخته شده. 
        با طراحی شیشه‌ای و ابزارهای داخلی قدرتمند، گشت‌وگذار در وب را برای شما لذت‌بخش‌تر می‌کند.
    </p>

    <div class="features">
        <div class="feature-item"><i class="fas fa-bolt"></i> سریع</div>
        <div class="feature-item"><i class="fas fa-shield-alt"></i> امن</div>
        <div class="feature-item"><i class="fas fa-magic"></i> مدرن</div>
    </div>

    <a href="#" class="download-btn">دانلود مستقیم (.exe)</a>
</div>

</body>
</html>
