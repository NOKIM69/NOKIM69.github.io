<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOKIM | Official</title>
    <style>
        body {
            margin: 0;
            background-color: #0e0e0e; /* تم تیره و حرفه‌ای */
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* کلمه NOKIM با افکت شیشه‌ای و بازتاب نور */
        .brand-name {
            font-size: 10vw;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: linear-gradient(90deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.8) 50%, rgba(255,255,255,0.1) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shine 5s infinite;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.2));
            margin-bottom: 20px;
        }

        @keyframes shine {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        .subtitle {
            font-weight: 300;
            letter-spacing: 0.2em;
            color: #888;
            margin-top: -10px;
        }

        footer {
            position: absolute;
            bottom: 30px;
            font-size: 0.9rem;
            color: #444;
        }
    </style>
</head>
<body>

    <h1 class="brand-name">NOKIM</h1>
    <div class="subtitle">DEVELOPMENT & INNOVATION</div>

    <footer>© 2026 NOKIM Corporation. All rights reserved.</footer>

</body>
</html>
