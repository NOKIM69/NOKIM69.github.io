<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>به نوکیم خوش آمدید</title>
    <style>
        body {
            font-family: 'Tahoma', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: white;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        h1 { font-size: 3rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; opacity: 0.9; margin-bottom: 25px; }
        .btn {
            background: white;
            color: #764ba2;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover { background: #f0f0f0; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <h1>به نوکیم خوش آمدید</h1>
        <p>این یک صفحه تست برای شروع پروژه جذاب شماست.</p>
        <a href="#" class="btn">شروع همکاری</a>
    </div>
</body>
</html>
